# file: sonar-project.properties
sonar.projectKey=roboshop-catalogue
sonar.projectName=roboshop-catalogue
sonar.projectVersion=1.0.0
# source code is in current directory, that's why given .
sonar.sources=.
sonar.exclusions=jenkinsfile,**/node_modules/**,**/db/** 

sonar.tests=test
sonar.test.inclusions=test/**/*.test.js

# Coverage report generated by Jest (lcov format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test results in JUnit XML format generated by jest-junit
sonar.junit.reportPaths=junit.xml